name: SkibCommon
version: 1.0
main: skibidilandia.SkibCommon
api-version: 26.1.2
description: Plugin principal do servidor Skibidilândia, adicionando comandos e funcionalidades personalizadas.
commands:
  g:
    description: Envia uma mensagem global para todos os jogadores.
    usage: /g <mensagem>
  w:
    description: Envia uma mensagem privada para outro jogador.
    usage: /w <jogador> <mensagem>
  tell:
    description: Envia uma mensagem privada para outro jogador.
    usage: /tell <jogador> <mensagem>
  tpisland:
    description: Teleporta para uma localização aleatória de uma das ilhas.
    usage: /tpisland <ilha>
  minerador:
    description: (Admin) Entrega uma mineradora automática de um nível.
    usage: /minerador dar <1-6> [jogador]
    permission: skib.miner.admin
  blueprint:
    description: Cria e gera construções a partir de blueprints.
    usage: /blueprint <varinha|criar <nome>>
    aliases: [bp]
    permission: skib.blueprint.admin
  furnacetool:
    description: (Admin) Entrega uma ferramenta da fornalha (auto-fundição).
    usage: /furnacetool dar <picareta|machado|pa> [jogador]
    aliases: [ft]
    permission: skib.furnacetools.admin
  fuckbedrocks:
    description: (Admin) Entrega a Picareta Quebra-Bedrock, o TNT Nuclear ou o Carrinho com TNT Nuclear.
    usage: /fuckbedrocks dar <picareta|tnt|carrinho> [jogador] [quantidade]
    aliases: [fb]
    permission: skib.fuckbedrocks.admin
  tnttools:
    description: (Admin) Entrega a Espada TNT ou as peças da Armadura TNT.
    usage: /tnttools dar <espada|capacete|peitoral|calca|bota|armadura> [jogador]
    aliases: [tt]
    permission: skib.tnttools.admin
  minemagic:
    description: (Admin) Entrega o Cajado de Fogo ou o Cajado do Necromante.
    usage: /minemagic dar <cajadofogo|cajadonecromante> [jogador]
    aliases: [mm]
    permission: skib.minemagic.admin

